<!-- This tells the browser that the document type is HTML5 -->
<!DOCTYPE html>

<!-- The <html> tag is the root element of the webpage -->
<!-- lang="en" tells the browser that the language of the page is English -->
<html lang="en">

<head>
    <!-- <head> contains information about the webpage, not visible on the page -->

    <!-- This sets the character encoding to UTF-8 -->
    <!-- UTF-8 supports most characters and symbols used worldwide -->
    <meta charset="UTF-8">

    <!-- This makes the website responsive on mobile devices -->
    <!-- It controls how the page is displayed on different screen sizes -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- The <title> tag sets the title of the webpage -->
    <!-- This title appears on the browser tab -->
    <title>Document</title>
</head>

<body>
    <!-- The <body> tag contains everything visible on the webpage -->

    <!-- <h1> is the largest heading tag in HTML -->
    <!-- It is used to display the main heading of the page -->
    <h1>First Code in JavaScript</h1>

    <!-- The <script> tag is used to connect JavaScript to the HTML page -->
    <!-- src="index.js" means the JavaScript code is stored in an external file called index.js -->
    <!-- The browser will load and run the JavaScript from this file -->
    <script src="index.js"></script>

</body>

</html>
