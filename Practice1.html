<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic Amazon Card</title>
    <link rel="Stylesheet" href="Practice1.css">
</head>
<body>

<div class="card">

    <div class="image-box">
        <img src="https://topperskit.com/cdn/shop/files/59_766ec4ac-e818-4c3c-b245-dba0d491ea54.jpg?v=1709648213&width=416">
    </div>

    <div class="content">
        <h3 id="title"></h3>

        <div class="rating">
            <span id="stars"></span>
            <span class="count" id="count"></span>
        </div>

        <div class="deal" id="deal"></div>

        <div class="price">
            <span class="current" id="price"></span>
            <span class="mrp" id="mrp"></span>
            <span class="off" id="off"></span>
        </div>

    </div>

</div>

<script src="Practice1.js"></script>
</body>
</html>
